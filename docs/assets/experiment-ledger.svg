<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">AI Money Lab evidence ledger</title>
  <desc id="desc">A dark dashboard showing one closed experiment, one inconclusive result, zero verified revenue, and an evidence validation pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="64" y="72" fill="#f9fafb" font-size="32" font-family="system-ui, sans-serif" font-weight="700">AI Money Lab</text>
  <text x="64" y="108" fill="#c7d2fe" font-size="19" font-family="system-ui, sans-serif">Evidence before narrative</text>
  <g font-family="system-ui, sans-serif">
    <rect x="64" y="146" width="250" height="120" rx="18" fill="#ffffff12" stroke="#ffffff24"/>
    <text x="88" y="184" fill="#cbd5e1" font-size="16">CLOSED EXPERIMENTS</text>
    <text x="88" y="238" fill="#f8fafc" font-size="48" font-weight="700">1</text>
    <rect x="338" y="146" width="250" height="120" rx="18" fill="#ffffff12" stroke="#ffffff24"/>
    <text x="362" y="184" fill="#cbd5e1" font-size="16">INCONCLUSIVE</text>
    <text x="362" y="238" fill="#f8fafc" font-size="48" font-weight="700">1</text>
    <rect x="612" y="146" width="250" height="120" rx="18" fill="#ffffff12" stroke="#ffffff24"/>
    <text x="636" y="184" fill="#cbd5e1" font-size="16">VERIFIED REVENUE</text>
    <text x="636" y="238" fill="#f8fafc" font-size="42" font-weight="700">CNY 0</text>
    <rect x="886" y="146" width="250" height="120" rx="18" fill="#ffffff12" stroke="#ffffff24"/>
    <text x="910" y="184" fill="#cbd5e1" font-size="16">HIGHEST EVIDENCE</text>
    <text x="910" y="231" fill="#f8fafc" font-size="29" font-weight="700">self-test</text>
    <rect x="64" y="310" width="1072" height="146" rx="18" fill="#0f172acc" stroke="#ffffff24"/>
    <text x="88" y="348" fill="#94a3b8" font-size="15">EXPERIMENT 001</text>
    <text x="88" y="388" fill="#f8fafc" font-size="26" font-weight="700">AI resume optimizer</text>
    <text x="88" y="423" fill="#cbd5e1" font-size="17">MVP worked locally; external acquisition was not tested.</text>
    <rect x="820" y="348" width="282" height="58" rx="29" fill="url(#accent)"/>
    <text x="961" y="385" text-anchor="middle" fill="#111827" font-size="18" font-weight="700">VALIDATED MANIFEST</text>
  </g>
</svg>
